name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

jobs:
  check:
    name: check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y bats shellcheck stow figlet zsh
          curl -sSL https://github.com/mvdan/sh/releases/download/v3.8.0/shfmt_v3.8.0_linux_amd64 \
            -o /usr/local/bin/shfmt && chmod +x /usr/local/bin/shfmt

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install bash bats-core shellcheck stow figlet shfmt
          echo "$(brew --prefix)/bin" >> "$GITHUB_PATH"

      - name: Run checks
        run: make check

  nix-build:
    name: nix build (ubuntu-latest)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixpkgs-unstable

      - name: Build Nix package
        run: nix build

      - name: Version and help (lib/ + locales/ path resolution)
        run: |
          ./result/bin/dfy --version
          ./result/bin/dfy --help

      - name: Spanish locale (i18n works from Nix store)
        run: ./result/bin/dfy --lang es --help | grep -q "Uso:"

      - name: doctor (bash >= 4, stow and figlet reachable via wrapProgram)
        run: DFY_DIR=$(mktemp -d) ./result/bin/dfy doctor

      - name: update shows Nix hint
        run: ./result/bin/dfy update | grep -q "nix profile upgrade dotlify"

      - name: uninstall shows Nix hint
        run: ./result/bin/dfy uninstall | grep -q "nix profile remove dotlify"

      - name: Installed files (man, completions)
        run: |
          test -f result/share/man/man1/dfy.1
          test -f result/share/bash-completion/completions/dfy
          test -f result/share/zsh/site-functions/_dfy
