name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

jobs:
  check:
    name: check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y bats shellcheck stow figlet zsh
          curl -sSL https://github.com/mvdan/sh/releases/download/v3.8.0/shfmt_v3.8.0_linux_amd64 \
            -o /usr/local/bin/shfmt && chmod +x /usr/local/bin/shfmt

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install bats-core shellcheck shfmt stow figlet bash

      - name: Run checks
        run: make check
